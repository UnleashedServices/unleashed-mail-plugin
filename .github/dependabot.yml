# Keeps the SHA-pinned GitHub Actions current (AGENT_CONTRACTS.md §6 pins by commit SHA;
# Dependabot updates the pin in place and preserves the ` # vX.Y.Z` tag comment).
# COREDEV-2488 (audit critic.5). The bundled review-synthesizer MCP is stdlib-only, so there
# is no pip/npm ecosystem to track.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"
